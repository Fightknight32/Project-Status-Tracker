<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Schedule Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Custom Icon Component to work with Lucide in HTML
        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const initialTasks = [
                { id: 1, name: 'Project Kickoff', targetStart: '2024-05-01', targetEnd: '2024-05-02', actualStart: '2024-05-01', actualEnd: '2024-05-03', assignee: 'Alex', status: 'Done' },
                { id: 2, name: 'Requirements Analysis', targetStart: '2024-05-03', targetEnd: '2024-05-10', actualStart: '2024-05-05', actualEnd: '2024-05-12', assignee: 'Sam', status: 'In Progress' },
                { id: 3, name: 'UI/UX Design Phase', targetStart: '2024-05-08', targetEnd: '2024-05-20', actualStart: '2024-05-08', actualEnd: '', assignee: 'Jordan', status: 'In Progress' }
            ];

            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('unified-tracker-gh-pages');
                return saved ? JSON.parse(saved) : initialTasks;
            });

            const [showTargetCol, setShowTargetCol] = useState(true);
            const [showActualCol, setShowActualCol] = useState(true);
            const [showMetaCol, setShowMetaCol] = useState(true);
            const [zoom, setZoom] = useState(45);

            useEffect(() => {
                localStorage.setItem('unified-tracker-gh-pages', JSON.stringify(tasks));
            }, [tasks]);

            const addTask = () => {
                const today = new Date().toISOString().split('T')[0];
                const newTask = {
                    id: Date.now(),
                    name: 'New Activity',
                    targetStart: today,
                    targetEnd: today,
                    actualStart: today,
                    actualEnd: '',
                    assignee: '',
                    status: 'In Progress'
                };
                setTasks([...tasks, newTask]);
            };

            const deleteTask = (id) => {
                setTasks(tasks.filter(task => task.id !== id));
            };

            const updateTask = (id, field, value) => {
                setTasks(tasks.map(task => task.id === id ? { ...task, [field]: value } : task));
            };

            const timelineDates = useMemo(() => {
                if (tasks.length === 0) return [];
                const allDates = tasks.flatMap(t => [
                    t.targetStart ? new Date(t.targetStart) : null,
                    t.targetEnd ? new Date(t.targetEnd) : null,
                    t.actualStart ? new Date(t.actualStart) : null,
                    t.actualEnd ? new Date(t.actualEnd) : null
                ]).filter(d => d !== null && !isNaN(d));

                const minDate = allDates.length ? new Date(Math.min(...allDates)) : new Date();
                const maxDate = allDates.length ? new Date(Math.max(...allDates)) : new Date();
                minDate.setDate(minDate.getDate() - 3);
                maxDate.setDate(maxDate.getDate() + 15);
                
                const dates = [];
                let current = new Date(minDate);
                while (current <= maxDate) {
                    dates.push(new Date(current));
                    current.setDate(current.getDate() + 1);
                }
                return dates;
            }, [tasks]);

            const getPosition = (dateStr) => {
                if (!dateStr) return -1;
                const date = new Date(dateStr).toISOString().split('T')[0];
                return timelineDates.findIndex(d => d.toISOString().split('T')[0] === date);
            };

            return (
                <div className="min-h-screen flex flex-col overflow-hidden h-screen">
                    {/* Compact Navbar */}
                    <nav className="bg-white border-b border-slate-200 px-4 py-2 flex items-center justify-between sticky top-0 z-50 shadow-sm shrink-0 h-14">
                        <div className="flex items-center gap-4 min-w-0">
                            <div className="flex items-center gap-2 shrink-0">
                                <div className="bg-indigo-600 p-1.5 rounded-lg text-white">
                                    <Icon name="gantt-chart-square" size={18} />
                                </div>
                                <h1 className="text-sm font-bold text-slate-800 hidden md:block whitespace-nowrap">Schedule Variance Tracker</h1>
                            </div>
                            
                            {/* Visibility Toggles Container */}
                            <div className="flex items-center bg-slate-100 p-0.5 rounded-lg border border-slate-200 shrink-0">
                                <button 
                                    onClick={() => setShowTargetCol(!showTargetCol)} 
                                    className={`flex items-center gap-1 px-2 py-1 rounded-md text-[10px] font-bold transition-all ${showTargetCol ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400 hover:text-slate-500'}`}
                                    title="Toggle Target Columns"
                                >
                                    {showTargetCol ? <Icon name="eye" size={12}/> : <Icon name="eye-off" size={12}/>} 
                                    <span className="hidden sm:inline">Target</span>
                                </button>
                                <button 
                                    onClick={() => setShowActualCol(!showActualCol)} 
                                    className={`flex items-center gap-1 px-2 py-1 rounded-md text-[10px] font-bold transition-all ${showActualCol ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-400 hover:text-slate-500'}`}
                                    title="Toggle Actual Columns"
                                >
                                    {showActualCol ? <Icon name="eye" size={12}/> : <Icon name="eye-off" size={12}/>} 
                                    <span className="hidden sm:inline">Actual</span>
                                </button>
                                <button 
                                    onClick={() => setShowMetaCol(!showMetaCol)} 
                                    className={`flex items-center gap-1 px-2 py-1 rounded-md text-[10px] font-bold transition-all ${showMetaCol ? 'bg-white text-slate-700 shadow-sm' : 'text-slate-400 hover:text-slate-500'}`}
                                    title="Toggle Details"
                                >
                                    {showMetaCol ? <Icon name="eye" size={12}/> : <Icon name="eye-off" size={12}/>} 
                                    <span className="hidden sm:inline">Details</span>
                                </button>
                            </div>
                        </div>

                        <div className="flex items-center gap-3 shrink-0">
                            {/* Zoom Control Group */}
                            <div className="flex items-center gap-2 bg-slate-50 px-2 py-1 rounded-lg border border-slate-200">
                                <button onClick={() => setZoom(Math.max(20, zoom - 5))} className="text-slate-400 hover:text-indigo-600 transition-colors">
                                    <Icon name="zoom-out" size={12} />
                                </button>
                                <input 
                                    type="range" 
                                    min="20" 
                                    max="150" 
                                    value={zoom} 
                                    onChange={(e) => setZoom(parseInt(e.target.value))} 
                                    className="w-16 sm:w-24 h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" 
                                />
                                <button onClick={() => setZoom(Math.min(150, zoom + 5))} className="text-slate-400 hover:text-indigo-600 transition-colors">
                                    <Icon name="zoom-in" size={12} />
                                </button>
                                <span className="text-[9px] font-black text-slate-500 w-4 text-center tabular-nums">{zoom}</span>
                            </div>
                            
                            <button 
                                onClick={addTask} 
                                className="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg flex items-center gap-1.5 text-xs font-semibold shadow-sm transition-all active:scale-95"
                            >
                                <Icon name="plus" size={14} /> 
                                <span className="hidden sm:inline">Add Activity</span>
                                <span className="sm:hidden">Add</span>
                            </button>
                        </div>
                    </nav>

                    <div className="flex-grow overflow-auto bg-white">
                        <div className="inline-block min-w-full relative">
                            {/* Table Header Container */}
                            <div className="flex sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm">
                                <div className="flex sticky left-0 z-50 bg-white border-r border-slate-200">
                                    <div className="w-64 min-w-[16rem] p-4 text-[10px] font-black uppercase tracking-widest text-slate-400">Activity</div>
                                    {showTargetCol && <div className="w-60 min-w-[15rem] p-4 text-[10px] font-black uppercase tracking-widest text-indigo-500 bg-indigo-50/20 border-l border-slate-100 text-center">Target Window</div>}
                                    {showActualCol && <div className="w-60 min-w-[15rem] p-4 text-[10px] font-black uppercase tracking-widest text-emerald-600 bg-emerald-50/20 border-l border-slate-100 text-center">Actual Window</div>}
                                    {showMetaCol && <div className="w-32 min-w-[8rem] p-4 text-[10px] font-black uppercase tracking-widest text-slate-400 border-l border-slate-100 text-center">Status</div>}
                                    <div className="w-12 border-l border-slate-100 shrink-0"></div>
                                </div>
                                <div className="flex">
                                    {timelineDates.map((date, idx) => {
                                        const isToday = date.toDateString() === new Date().toDateString();
                                        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                                        return (
                                            <div key={idx} style={{ minWidth: zoom, width: zoom }} className={`py-2 text-center border-r border-slate-100 flex flex-col items-center justify-center shrink-0 ${isToday ? 'bg-indigo-600 text-white z-10' : ''} ${isWeekend ? 'bg-slate-50/50' : ''}`}>
                                                <div className={`text-[8px] font-bold uppercase leading-tight ${isToday ? 'text-white' : 'text-slate-400'}`}>{date.toLocaleDateString('en-US', { month: 'short' })}</div>
                                                <div className="text-xs font-black leading-none my-0.5">{date.getDate()}</div>
                                                <div className={`text-[8px] font-medium leading-tight ${isToday ? 'text-indigo-100' : 'text-slate-300'}`}>{date.toLocaleDateString('en-US', { weekday: 'short' }).charAt(0)}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="flex flex-col">
                                {tasks.map(task => {
                                    const tStart = getPosition(task.targetStart);
                                    const tEnd = getPosition(task.targetEnd);
                                    const aStart = getPosition(task.actualStart);
                                    const aEnd = getPosition(task.actualEnd || new Date().toISOString().split('T')[0]);

                                    return (
                                        <div key={task.id} className="flex border-b border-slate-100 hover:bg-slate-50/50 group transition-all h-14">
                                            <div className="flex sticky left-0 z-30 bg-white group-hover:bg-slate-50 border-r border-slate-200 shadow-[2px_0_5px_rgba(0,0,0,0.01)]">
                                                <div className="w-64 min-w-[16rem] p-2 flex items-center">
                                                    <input className="w-full bg-transparent border-none text-sm font-semibold focus:ring-0 px-2 py-1" value={task.name} onChange={(e) => updateTask(task.id, 'name', e.target.value)} />
                                                </div>
                                                {showTargetCol && (
                                                    <div className="w-60 min-w-[15rem] p-2 flex items-center justify-center gap-1 bg-indigo-50/5 border-l border-slate-50">
                                                        <input type="date" value={task.targetStart} onChange={(e) => updateTask(task.id, 'targetStart', e.target.value)} className="text-[10px] bg-white border border-slate-200 rounded p-1 w-24" />
                                                        <Icon name="arrow-right" size={10} className="text-slate-300" />
                                                        <input type="date" value={task.targetEnd} onChange={(e) => updateTask(task.id, 'targetEnd', e.target.value)} className="text-[10px] bg-white border border-slate-200 rounded p-1 w-24" />
                                                    </div>
                                                )}
                                                {showActualCol && (
                                                    <div className="w-60 min-w-[15rem] p-2 flex items-center justify-center gap-1 bg-emerald-50/5 border-l border-slate-50">
                                                        <input type="date" value={task.actualStart} onChange={(e) => updateTask(task.id, 'actualStart', e.target.value)} className="text-[10px] bg-white border border-slate-200 rounded p-1 w-24" />
                                                        <Icon name="arrow-right" size={10} className="text-slate-300" />
                                                        <input type="date" value={task.actualEnd} onChange={(e) => updateTask(task.id, 'actualEnd', e.target.value)} className="text-[10px] bg-white border border-slate-200 rounded p-1 w-24" />
                                                    </div>
                                                )}
                                                {showMetaCol && (
                                                    <div className="w-32 min-w-[8rem] p-2 flex items-center justify-center border-l border-slate-50">
                                                        <select value={task.status} onChange={(e) => updateTask(task.id, 'status', e.target.value)} className={`text-[9px] font-black uppercase tracking-wider rounded px-2 py-1 border outline-none cursor-pointer ${task.status === 'Done' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-amber-50 text-amber-700 border-amber-200'}`}>
                                                            <option value="In Progress">In Progress</option>
                                                            <option value="Done">Done</option>
                                                        </select>
                                                    </div>
                                                )}
                                                <div className="w-12 p-2 flex items-center justify-center border-l border-slate-50 shrink-0">
                                                    <button onClick={() => deleteTask(task.id)} className="p-1.5 text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all">
                                                        <Icon name="trash-2" size={14} />
                                                    </button>
                                                </div>
                                            </div>

                                            <div className="relative flex-grow h-full">
                                                <div className="absolute inset-0 flex pointer-events-none">
                                                    {timelineDates.map((date, i) => (
                                                        <div key={i} style={{ minWidth: zoom, width: zoom }} className={`border-r border-slate-100/50 h-full shrink-0 ${date.getDay() === 0 || date.getDay() === 6 ? 'bg-slate-50/30' : ''}`}></div>
                                                    ))}
                                                </div>
                                                <div className="relative h-full flex flex-col justify-center gap-1">
                                                    {tStart !== -1 && tEnd !== -1 && (
                                                        <div className="absolute h-2.5 rounded-full bg-indigo-100/60 border border-indigo-200 z-0 transition-all" style={{ left: `${tStart * zoom}px`, width: `${(tEnd - tStart + 1) * zoom}px`, top: '20%' }}>
                                                            <div className="absolute -top-3 left-0 text-[7px] font-black text-indigo-400 uppercase tracking-tighter opacity-80">Target</div>
                                                        </div>
                                                    )}
                                                    {aStart !== -1 && (
                                                        <div className={`absolute h-4 rounded-full shadow-sm z-10 flex items-center transition-all ${task.status === 'Done' ? 'bg-emerald-500 ring-2 ring-emerald-100' : 'bg-amber-400 ring-2 ring-amber-100'}`} style={{ left: `${aStart * zoom}px`, width: `${Math.max(8, (Math.max(0, (aEnd === -1 ? aStart : aEnd) - aStart + 1)) * zoom)}px`, top: '45%' }}>
                                                            {task.actualStart > task.targetStart && (
                                                                <div className="absolute -top-4 left-0 text-[8px] font-black text-rose-600 flex items-center gap-0.5 whitespace-nowrap bg-white/95 px-1 rounded border border-rose-100 shadow-sm">
                                                                    <Icon name="alert-circle" size={8} /> OVERRUN
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
